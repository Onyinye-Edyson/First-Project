<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Todo App</title>
    <meta name="description" content="A beautiful and dynamic todo app with persistent session data.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Tasks</h1>
            <p>Keep track of your daily goals</p>
        </header>

        <form id="todo-form">
            <div class="input-group">
                <input 
                    type="text" 
                    id="todo-input" 
                    placeholder="What needs to be done?" 
                    autocomplete="off"
                    required
                >
                <button type="submit" id="add-btn" aria-label="Add Task">
                    <i data-lucide="plus"></i>
                </button>
            </div>
        </form>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul id="todo-list" class="todo-list">
            <!-- Todo items will be dynamically injected here -->
        </ul>
        
        <div class="stats">
            <span id="items-left">0 items left</span>
            <button id="clear-completed" class="clear-btn">Clear completed</button>
        </div>
    </div>

    <!-- Script to load Lucide icons -->
    <script>
      lucide.createIcons();
    </script>
    <script src="script.js"></script>
</body>
</html>
